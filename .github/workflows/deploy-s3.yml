name: Deploy website to Amazon S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deployment
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production website
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: cloud-portfolio-deployment
          mask-aws-account-id: true

      - name: Upload static assets
        run: >-
          aws s3 sync . "s3://${{ vars.S3_BUCKET }}"
          --delete
          --cache-control "public,max-age=3600"
          --exclude ".git/*"
          --exclude ".github/*"
          --exclude ".agents/*"
          --exclude "README*"
          --exclude "docs/*"
          --exclude "*.html"

      - name: Upload HTML without browser caching
        run: >-
          aws s3 sync . "s3://${{ vars.S3_BUCKET }}"
          --exclude "*"
          --include "*.html"
          --cache-control "no-cache, no-store, must-revalidate"
          --content-type "text/html; charset=utf-8"

      - name: Refresh CloudFront cache
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"

      - name: Show deployed location
        run: echo "Deployment to s3://${{ vars.S3_BUCKET }} completed successfully."
