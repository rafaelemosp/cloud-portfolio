<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Automated AWS portfolio deployment architecture</title>
  <desc id="desc">A GitHub repository triggers GitHub Actions, authenticates through AWS OIDC, and deploys the portfolio to Amazon S3.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#0d1117"/><stop offset="1" stop-color="#101a2a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#58a6ff"/></marker></defs>
  <rect width="1200" height="500" rx="24" fill="url(#bg)"/>
  <g fill="none" stroke="#58a6ff" stroke-width="4" marker-end="url(#arrow)"><path d="M265 250h165"/><path d="M695 250h165"/></g>
  <g font-family="Arial,sans-serif" text-anchor="middle">
    <g transform="translate(70 140)"><rect width="195" height="220" rx="18" fill="#161b22" stroke="#30363d"/><circle cx="98" cy="69" r="34" fill="#21262d" stroke="#58a6ff" stroke-width="3"/><path d="M83 69h30M98 54v30" stroke="#58a6ff" stroke-width="4"/><text x="98" y="132" fill="#f0f6fc" font-size="25" font-weight="700">GitHub</text><text x="98" y="164" fill="#8b949e" font-size="16">main branch</text><text x="98" y="188" fill="#7ee787" font-size="15">push event</text></g>
    <g transform="translate(430 140)"><rect width="265" height="220" rx="18" fill="#161b22" stroke="#30363d"/><circle cx="133" cy="69" r="34" fill="#21262d" stroke="#7ee787" stroke-width="3"/><path d="m116 70 11 11 24-27" fill="none" stroke="#7ee787" stroke-width="5"/><text x="133" y="132" fill="#f0f6fc" font-size="25" font-weight="700">GitHub Actions</text><text x="133" y="164" fill="#8b949e" font-size="16">secure AWS OIDC</text><text x="133" y="188" fill="#7ee787" font-size="15">short-lived credentials</text></g>
    <g transform="translate(860 140)"><rect width="270" height="220" rx="18" fill="#161b22" stroke="#30363d"/><path d="M81 56h108l-10 74H91z" fill="#21262d" stroke="#ff9900" stroke-width="3"/><path d="M103 75h64M100 95h70" stroke="#ff9900" stroke-width="3"/><text x="135" y="164" fill="#f0f6fc" font-size="25" font-weight="700">Amazon S3</text><text x="135" y="192" fill="#8b949e" font-size="16">static website hosting</text></g>
    <text x="600" y="440" fill="#8b949e" font-size="17">Every push to main is authenticated, synchronized, and published automatically</text>
  </g>
</svg>
