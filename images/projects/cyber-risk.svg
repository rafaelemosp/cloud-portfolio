<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="t d"><title id="t">Cybersecurity awareness risk priorities</title><desc id="d">A matrix showing high-priority phishing, passwords and social engineering risks alongside medium-priority remote work, removable media and physical security risks.</desc><rect width="960" height="420" rx="22" fill="#10161e"/><g font-family="Consolas,monospace"><text x="70" y="55" fill="#e6edf3" font-size="22">AWARENESS PRIORITIES</text><g><rect x="70" y="85" width="390" height="275" rx="16" fill="#22191a" stroke="#ff7b72" stroke-width="2"/><text x="100" y="125" fill="#ff7b72" font-size="18">HIGH PRIORITY</text><text x="100" y="175" fill="#e6edf3" font-size="17">◆ Phishing and suspicious email</text><text x="100" y="220" fill="#e6edf3" font-size="17">◆ Passwords and authentication</text><text x="100" y="265" fill="#e6edf3" font-size="17">◆ Social engineering</text><text x="100" y="310" fill="#e6edf3" font-size="17">◆ Unapproved removable media</text></g><g><rect x="500" y="85" width="390" height="275" rx="16" fill="#17202b" stroke="#58a6ff" stroke-width="2"/><text x="530" y="125" fill="#58a6ff" font-size="18">CONTROL &amp; TRAIN</text><text x="530" y="175" fill="#e6edf3" font-size="17">✓ Remote-work security</text><text x="530" y="220" fill="#e6edf3" font-size="17">✓ Screen and physical security</text><text x="530" y="265" fill="#e6edf3" font-size="17">✓ BYOD and data handling</text><text x="530" y="310" fill="#e6edf3" font-size="17">✓ Review and improvement cycle</text></g></g></svg>
